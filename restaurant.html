<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodExpress</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #0a0a0a;
}

/* fade animation */
.fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s ease;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}
</style>

</head>

<body class="text-white font-sans">

<!-- HERO -->
<section class="relative overflow-hidden">

<img src="https://images.unsplash.com/photo-1550547660-d9450f859349"
class="w-full h-[60vh] object-cover opacity-40 scale-110">

<div class="absolute inset-0 flex flex-col justify-center items-center text-center px-6 fade-up">
<h1 class="text-5xl font-black mb-4 tracking-tight">FoodExpress</h1>

<p class="text-gray-300 mb-6">
Hot, fast & irresistible.
</p>

<a href="https://wa.me/5500000000000"
class="bg-white text-black px-6 py-3 rounded-xl font-bold hover:scale-110 transition">
Order via WhatsApp
</a>
</div>

</section>

<!-- MENU -->
<section class="px-6 py-20">

<h2 class="text-3xl font-bold mb-10 text-center fade-up">
Popular Menu
</h2>

<div class="grid gap-8 max-w-xl mx-auto">

<!-- CARD -->
<div class="bg-gray-900 rounded-2xl overflow-hidden hover:scale-105 transition fade-up">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd"
class="w-full h-44 object-cover">

<div class="p-4">
<h3 class="font-bold">Classic Burger</h3>
<p class="text-gray-400 text-sm">⭐ 4.9 (200+)</p>
<p class="mt-2 font-bold">$12.00</p>
</div>
</div>

<div class="bg-gray-900 rounded-2xl overflow-hidden hover:scale-105 transition fade-up">
<img src="https://images.unsplash.com/photo-1601924582975-7e60a48c1cba"
class="w-full h-44 object-cover">

<div class="p-4">
<h3 class="font-bold">Pepperoni Pizza</h3>
<p class="text-gray-400 text-sm">⭐ 4.8 (150+)</p>
<p class="mt-2 font-bold">$18.00</p>
</div>
</div>

<div class="bg-gray-900 rounded-2xl overflow-hidden hover:scale-105 transition fade-up">
<img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"
class="w-full h-44 object-cover">

<div class="p-4">
<h3 class="font-bold">Loaded Fries</h3>
<p class="text-gray-400 text-sm">⭐ 4.7 (120+)</p>
<p class="mt-2 font-bold">$8.00</p>
</div>
</div>

</div>

</section>

<script>
const elements = document.querySelectorAll('.fade-up');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
  </html>
