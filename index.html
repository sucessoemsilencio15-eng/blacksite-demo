<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BlackSite Studio</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background: #000; color: white; }
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="bg-white text-black text-center py-2 text-xs font-bold">
🚀 International Website Studio
</div>

<!-- HERO -->
<section class="text-center px-6 py-16">
    <h1 class="text-4xl font-black uppercase">
        BlackSite
    </h1>

    <p class="mt-4 text-gray-400 text-sm max-w-md mx-auto">
        High-converting websites designed to make you money.
    </p>

    <a href="#portfolio" class="mt-6 inline-block bg-white text-black px-6 py-3 rounded-xl font-bold text-sm">
        View Work
    </a>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="px-6 py-10">

    <h2 class="text-center text-xl font-bold mb-6">
        Demo Models
    </h2>

    <div class="grid grid-cols-1 gap-6">

        <div class="bg-white text-black p-4 rounded-xl">
            <h3 class="font-bold">Fashion Store</h3>
            <p class="text-sm text-gray-500">
                Perfect for selling clothes online.
            </p>
        </div>

        <div class="bg-white text-black p-4 rounded-xl">
            <h3 class="font-bold">Restaurant</h3>
            <p class="text-sm text-gray-500">
                Great for delivery and menus.
            </p>
        </div>

        <div class="bg-white text-black p-4 rounded-xl">
            <h3 class="font-bold">Fitness</h3>
            <p class="text-sm text-gray-500">
                Ideal for trainers and gyms.
            </p>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section class="text-center py-10">
    <a href="https://wa.me/5500000000000" class="bg-white text-black px-6 py-3 rounded-xl font-bold">
        Contact Me
    </a>
</section>

</body>
</html>
