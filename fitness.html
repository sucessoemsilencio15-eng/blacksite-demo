<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite Fitness</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #0a0a0a;
}

.fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s ease;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}
</style>

</head>

<body class="text-white font-sans">

<!-- HERO -->
<section class="relative overflow-hidden">

<img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1"
class="w-full h-[60vh] object-cover opacity-40 scale-110">

<div class="absolute inset-0 flex flex-col justify-center items-center text-center px-6 fade-up">
<h1 class="text-5xl font-black mb-4">Elite Fitness</h1>

<p class="text-gray-300 mb-6">
Build a body people respect.
</p>

<a href="https://wa.me/5500000000000"
class="bg-white text-black px-6 py-3 rounded-xl font-bold hover:scale-110 transition">
Start Now
</a>
</div>

</section>

<!-- PLANS -->
<section class="px-6 py-20">

<h2 class="text-3xl font-bold mb-10 text-center fade-up">
Training Plans
</h2>

<div class="grid gap-8 max-w-xl mx-auto">

<div class="bg-gray-900 p-6 rounded-2xl hover:scale-105 transition fade-up">
<h3 class="font-bold text-lg">Basic</h3>
<p class="text-gray-400">Start your journey</p>
<p class="mt-3 font-bold">$29/month</p>
</div>

<div class="bg-white text-black p-6 rounded-2xl scale-105 shadow-xl fade-up">
<h3 class="font-bold text-lg">Pro 🔥</h3>
<p>Most popular plan</p>
<p class="mt-3 font-bold">$59/month</p>
</div>

<div class="bg-gray-900 p-6 rounded-2xl hover:scale-105 transition fade-up">
<h3 class="font-bold text-lg">Premium</h3>
<p class="text-gray-400">Full transformation</p>
<p class="mt-3 font-bold">$99/month</p>
</div>

</div>

</section>

<!-- TESTIMONIAL -->
<section class="text-center pb-20 fade-up">

<p class="text-gray-400 italic max-w-md mx-auto">
"Lost 10kg in 2 months. Best decision I made."
</p>

</section>

<script>
const elements = document.querySelectorAll('.fade-up');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
